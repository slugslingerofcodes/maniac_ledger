# The gate, enforced. `npm run verify` (lint + test + build) already exists
# and is green — this makes it run on every push and PR instead of relying on
# someone remembering to run it. A gate that requires discipline isn't a gate.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # One run per ref; a new push cancels the stale run.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # The build only needs these to *construct* clients — every page that
      # actually queries is dynamic (rendered at request time), so well-formed
      # placeholders are enough to typecheck and prerender the static shells.
      # Set real repo secrets later if a static page ever queries at build.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint + test + build
        run: npm run verify

      - name: Schema drift check
        # Probes the live database via PostgREST (anon key, limit=0 — reads no
        # rows). Only meaningful with real secrets; skipped on the placeholder
        # so forks and secretless clones stay green. (env, not secrets, in the
        # condition — the secrets context isn't available in step `if`.)
        if: ${{ env.NEXT_PUBLIC_SUPABASE_URL != 'https://placeholder.supabase.co' }}
        run: npm run check:schema
